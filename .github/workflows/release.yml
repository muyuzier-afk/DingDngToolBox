name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的版本标签（如 v0.0.2），仅手动触发时填写'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build signed APK & publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          RAW="${TAG#v}"
          VERSION_NAME="$RAW"
          if [[ "$RAW" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          else
            VERSION_CODE=$(date +%s | tail -c 8)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=$TAG name=$VERSION_NAME code=$VERSION_CODE"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: platforms;android-34 build-tools;34.0.0 platform-tools

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
          cache-disabled: false

      - name: Check in-repo keystore
        run: |
          set -euo pipefail
          test -f keystore/dingdongji-release.jks
          test -f keystore/signing.properties
          ls -lh keystore/

      - name: Build signed release APK
        env:
          VERSION_NAME: ${{ steps.ver.outputs.version_name }}
          VERSION_CODE: ${{ steps.ver.outputs.version_code }}
        run: gradle assembleRelease --no-daemon --stacktrace --console=plain

      - name: Locate & verify APK
        id: apk
        run: |
          set -euo pipefail
          APK=$(ls -1 app/build/outputs/apk/release/*-release*.apk | head -n 1)
          test -n "$APK"
          test -f "$APK"
          OUT="DingDongJiToolbox-${{ steps.ver.outputs.version_name }}-release.apk"
          cp "$APK" "$OUT"
          echo "apk_upload=$OUT" >> "$GITHUB_OUTPUT"
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner" verify --verbose "$OUT" || \
            "$ANDROID_HOME/build-tools/34.0.0/apksigner" verify --verbose "$OUT"
          ls -lh "$OUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: DingDongJi Toolbox ${{ steps.ver.outputs.version_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version_name, 'alpha') || contains(steps.ver.outputs.version_name, 'beta') || contains(steps.ver.outputs.version_name, 'rc') || contains(steps.ver.outputs.tag, 'alpha') || contains(steps.ver.outputs.tag, 'beta') }}
          files: |
            ${{ steps.apk.outputs.apk_upload }}
          body: |
            ## 叮咚鸡工具箱 ${{ steps.ver.outputs.version_name }}

            - **versionCode**: `${{ steps.ver.outputs.version_code }}`
            - **包名**: `com.toolbox.ddj`
            - **签名**: 仓库内公开 release 密钥签名

            ### 安装说明
            1. 下载下方 `DingDongJiToolbox-*-release.apk`
            2. 在 Android 设备上允许安装未知来源应用后安装

            > 由 GitHub Actions 自动构建并签名发布。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
